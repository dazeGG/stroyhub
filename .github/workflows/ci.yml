name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --all-extras --frozen

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy packages/stroyhub apps/api apps/worker

  admin:
    name: Admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.12"
          cache: pnpm
          cache-dependency-path: apps/admin/pnpm-lock.yaml

      - name: Install admin dependencies
        run: pnpm install --frozen-lockfile

      - name: Run admin typecheck
        run: pnpm typecheck

      - name: Build admin
        run: pnpm build
