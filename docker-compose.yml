name: stroyhub

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stroyhub}
      POSTGRES_USER: ${POSTGRES_USER:-stroyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stroyhub}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - stroyhub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - stroyhub_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stroyhub_postgres_data:
  stroyhub_redis_data:
