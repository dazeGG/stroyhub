name: stroyhub

services:
  api:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    environment:
      STROYHUB_DATABASE_URL: postgresql+psycopg://stroyhub:stroyhub@postgres:5432/stroyhub
      STROYHUB_REDIS_URL: redis://redis:6379/0
      UV_LINK_MODE: copy
    command:
      - sh
      - -c
      - >
        uv sync --all-extras &&
        uv run alembic upgrade head &&
        uv run uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - .:/app
      - stroyhub_uv_cache:/root/.cache/uv
      - stroyhub_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    environment:
      STROYHUB_DATABASE_URL: postgresql+psycopg://stroyhub:stroyhub@postgres:5432/stroyhub
      STROYHUB_REDIS_URL: redis://redis:6379/0
      UV_LINK_MODE: copy
    command:
      - sh
      - -c
      - >
        uv sync --all-extras &&
        uv run watchfiles --filter python
        --ignore-paths .venv,.uv-cache,.pnpm-store,apps/admin/node_modules,apps/admin/dist
        --sigint-timeout 10 --sigkill-timeout 5
        'uv run celery -A apps.worker.celery_app:celery_app worker --beat
        --loglevel=INFO --schedule=/tmp/celerybeat-schedule'
        apps packages
    volumes:
      - .:/app
      - stroyhub_uv_cache:/root/.cache/uv
      - stroyhub_venv:/app/.venv
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin_api:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    environment:
      STROYHUB_DATABASE_URL: postgresql+psycopg://stroyhub:stroyhub@postgres:5432/stroyhub
      STROYHUB_REDIS_URL: redis://redis:6379/0
      UV_LINK_MODE: copy
    command:
      - sh
      - -c
      - >
        uv sync --all-extras &&
        uv run uvicorn apps.admin_api.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "${ADMIN_API_PORT:-8001}:8001"
    volumes:
      - .:/app
      - stroyhub_uv_cache:/root/.cache/uv
      - stroyhub_venv:/app/.venv
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  admin:
    image: node:22-bookworm-slim
    working_dir: /app/apps/admin
    environment:
      VITE_API_PROXY_TARGET: http://admin_api:8001
    command:
      - sh
      - -c
      - >
        corepack enable &&
        pnpm install --frozen-lockfile &&
        pnpm dev --host 0.0.0.0 --port 5173
    ports:
      - "${ADMIN_PORT:-5173}:5173"
    volumes:
      - .:/app
      - stroyhub_admin_node_modules:/app/apps/admin/node_modules
    depends_on:
      admin_api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stroyhub}
      POSTGRES_USER: ${POSTGRES_USER:-stroyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stroyhub}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - stroyhub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - stroyhub_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stroyhub_postgres_data:
  stroyhub_redis_data:
  stroyhub_uv_cache:
  stroyhub_venv:
  stroyhub_admin_node_modules:
